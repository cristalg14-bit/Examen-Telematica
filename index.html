<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen Telemática - Aula 2.0</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#0f172a,#111827);
color:#e5e7eb;
}

.container{
max-width:800px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,0.04);
border:1px solid #00c2ff33;
border-radius:15px;
}

.opcion{
display:block;
padding:10px;
margin:8px 0;
background:#111827;
border-radius:8px;
cursor:pointer;
}

.selected{background:#00aaff;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<div id="inicio">
<h2>Examen Telemática</h2>
<input id="nombre" placeholder="Nombre completo">
<button onclick="iniciar()">Iniciar</button>
</div>

<div id="examen" class="hidden">
<div id="timer"></div>
<div id="progreso"></div>

<h3 id="pregunta"></h3>
<div id="opciones"></div>

<button onclick="confirmar()">Confirmar</button>
<button id="sig" onclick="siguiente()" style="display:none;">Siguiente</button>
</div>

<div id="resultado" class="hidden"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init("1mKKjfR7rkWsEaOOE");

/* ================= SEMILLA ÚNICA ================= */

function seedRandom(seed){
return function(){
seed = (seed * 9301 + 49297) % 233280;
return seed / 233280;
}
}

/* ================= BANCO GRANDE ================= */

const banco={

seleccion:[
...Array.from({length:30},(_,i)=>({
p:`Atenuación pregunta ${i+1}`,
c:0,
o:["Pérdida de señal","Ganancia","Amplificación"]
}))
],

vf:[
...Array.from({length:30},(_,i)=>({
p:`Verdadero/Falso ${i+1}`,
c:i%2===0
}))
],

afirmaciones:[
...Array.from({length:30},(_,i)=>({
p:`Selecciona correctas ${i+1}`,
c:[0,2],
o:["Correcta 1","Incorrecta","Correcta 2"]
}))
],

ordenar:[
...Array.from({length:30},(_,i)=>({
p:`Ordena proceso ${i+1}`,
c:[0,1,2],
o:["Inicio","Proceso","Fin"]
}))
]

};

/* ================= VARIABLES ================= */

let examen=[];
let i=0;
let seleccion=[];
let correctas=0;
let tipo="";
let respuestas=[];
let tiempo=1200;

/* ================= SHUFFLE CON SEMILLA ================= */

function shuffleSeed(arr,rand){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(rand()* (i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

/* ================= INICIAR ================= */

function iniciar(){

let nombre=document.getElementById("nombre").value || "anon";
let seed=Date.now()+nombre.length;
let rand=seedRandom(seed);

examen=[
...shuffleSeed(banco.seleccion,rand).slice(0,5),
...shuffleSeed(banco.vf,rand).slice(0,5),
...shuffleSeed(banco.afirmaciones,rand).slice(0,5),
...shuffleSeed(banco.ordenar,rand).slice(0,5)
];

document.getElementById("inicio").classList.add("hidden");
document.getElementById("examen").classList.remove("hidden");

timer();
cargar();
}

/* ================= TIMER ================= */

function timer(){
let t=setInterval(()=>{
tiempo--;

let m=Math.floor(tiempo/60);
let s=tiempo%60;

document.getElementById("timer").innerText=`${m}:${s<10?"0"+s:s}`;

if(tiempo<=0){
clearInterval(t);
finalizar();
}
},1000);
}

/* ================= CARGAR ================= */

function cargar(){

if(i<5)tipo="seleccion";
else if(i<10)tipo="vf";
else if(i<15)tipo="afirmaciones";
else tipo="ordenar";

let p=examen[i];

document.getElementById("progreso").innerText=(i+1)+"/20";
document.getElementById("pregunta").innerText=p.p;

let html="";

if(tipo==="vf"){
html+=`<div class="opcion" onclick="select(true,event)">Verdadero</div>`;
html+=`<div class="opcion" onclick="select(false,event)">Falso</div>`;
}else{
p.o.forEach((op,j)=>{
html+=`<div class="opcion" onclick="select(${j},event)">${op}</div>`;
});
}

document.getElementById("opciones").innerHTML=html;
}

/* ================= SELECCION ================= */

function select(val,e){

if(tipo==="seleccion"||tipo==="vf"){
seleccion=[val];
document.querySelectorAll(".opcion").forEach(o=>o.classList.remove("selected"));
e.target.classList.add("selected");
}

if(tipo==="afirmaciones"){
if(seleccion.includes(val)){
seleccion=seleccion.filter(x=>x!==val);
e.target.classList.remove("selected");
}else{
seleccion.push(val);
e.target.classList.add("selected");
}
}

if(tipo==="ordenar"){
seleccion.push(val);
e.target.classList.add("selected");
}
}

/* ================= CONFIRMAR ================= */

function confirmar(){

let p=examen[i];
let ok=false;

if(tipo==="seleccion") ok=seleccion[0]===p.c;
if(tipo==="vf") ok=seleccion[0]===p.c;
if(tipo==="afirmaciones") ok=JSON.stringify(seleccion.sort())===JSON.stringify(p.c);
if(tipo==="ordenar") ok=JSON.stringify(seleccion)===JSON.stringify(p.c);

if(ok)correctas++;

respuestas.push({pregunta:p.p,estado:ok?"🟩":"🟥"});

document.getElementById("sig").style.display="inline-block";
}

/* ================= SIGUIENTE ================= */

function siguiente(){
seleccion=[];
i++;

if(i>=20)finalizar();
else{
document.getElementById("sig").style.display="none";
cargar();
}
}

/* ================= FINAL ================= */

function finalizar(){

document.getElementById("examen").classList.add("hidden");
document.getElementById("resultado").classList.remove("hidden");

let nota=3+17*(correctas/20);

document.getElementById("resultado").innerHTML=`
<h2>Nota: ${nota.toFixed(1)}/20</h2>
<button onclick="location.reload()">Nuevo examen</button>
`;

let detalle="";

respuestas.forEach((r,idx)=>{
detalle+=`${idx+1}. ${r.estado} ${r.pregunta}\n`;
});

let reporte=`
Alumno: ${document.getElementById("nombre").value}
Nota: ${nota.toFixed(1)}/20

DETALLE DEL EXAMEN:
${detalle}
`;

emailjs.send("service_uzg3ddl","template_r0mmp9w",{
nombre:document.getElementById("nombre").value,
nota:nota.toFixed(1),
reporte:reporte
})
.then(()=>console.log("Correo enviado"))
.catch(err=>console.log("Error EmailJS",err));
});
}

</script>

</body>
</html>
