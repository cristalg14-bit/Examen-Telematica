<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen Telemática</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#0f172a,#111827);
color:#e5e7eb;
}

.container{
max-width:800px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,0.04);
border:1px solid #00c2ff33;
border-radius:15px;
box-shadow:0 0 20px #00c2ff22;
}

h2{color:#00e5ff;}

input{
padding:10px;
width:100%;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.confirmar{background:#00ff88;color:black;}
.siguiente{background:#00aaff;color:white;display:none;}

.opcion{
display:block;
margin:8px 0;
padding:10px;
background:#111827;
border-radius:8px;
cursor:pointer;
}

.opcion:hover{background:#1f2937;}

.selected{
background:#00aaff !important;
color:white;
}

header{
display:flex;
justify-content:space-between;
color:#00e5ff;
margin-bottom:15px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<div id="inicio">
<h2>Examen Telemática</h2>
<input id="nombre" placeholder="Nombre completo">
<button onclick="iniciar()">Iniciar Examen</button>
</div>

<div id="examen" class="hidden">

<header>
<div id="timer">20:00</div>
<div id="progreso">0/20</div>
</header>

<h3 id="pregunta"></h3>
<div id="opciones"></div>

<button class="confirmar" onclick="confirmar()">Confirmar</button>
<button class="siguiente" id="sig" onclick="siguiente()">Siguiente</button>

</div>

<div id="resultado" class="hidden"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init("1mKKjfR7rkWsEaOOE");

/* ================= BANCO ================= */

const banco={
seleccion:[
{p:"¿Qué es la atenuación?",c:0,o:["Pérdida de señal","Ganancia","Amplificación"]},
{p:"La diafonía es:",c:0,o:["Interferencia","Velocidad","Potencia"]},
{p:"Retardo depende de:",c:0,o:["Distancia","Color","Voltaje"]},
{p:"Retorno ocurre por:",c:0,o:["Mala conexión","Buen cable","Fibra"]},
{p:"Más distancia implica:",c:0,o:["Más atenuación","Menos","Igual"]},
{p:"El cable transporta:",c:0,o:["Señal","Color","Energía infinita"]}
],

vf:[
{p:"La atenuación aumenta con distancia",c:true},
{p:"Diafonía mejora señal",c:false},
{p:"Retardo depende del cable",c:true},
{p:"Retorno es deseado",c:false},
{p:"Cable largo aumenta retardo",c:true},
{p:"El medio no influye",c:false}
],

afirmaciones:[
{p:"Selecciona correctas",c:[0,2],o:["Atenuación aumenta","Diafonía mejora","Retardo depende"]},
{p:"Selecciona correctas",c:[0,1],o:["Mala conexión","Impedancia","Color"]},
{p:"Selecciona correctas",c:[1,2],o:["Software causa","Distancia afecta","Material influye"]},
{p:"Selecciona correctas",c:[0],o:["Diafonía es interferencia","Atenuación mejora","Retorno positivo"]},
{p:"Selecciona correctas",c:[0,2],o:["Cable largo","Velocidad elimina","Medio influye"]}
],

ordenar:[
{p:"Orden correcto",c:[0,1,2],o:["Transmisión","Atenuación","Recepción"]},
{p:"Orden correcto",c:[0,1,2],o:["Origen","Medio","Destino"]},
{p:"Orden correcto",c:[0,1,2],o:["Envio","Propagación","Recepción"]},
{p:"Orden correcto",c:[0,1,2],o:["Emisor","Cable","Receptor"]},
{p:"Orden correcto",c:[0,1,2],o:["Inicio","Proceso","Fin"]}
]
};

/* ================= VARIABLES ================= */

let examen=[];
let i=0;
let seleccion=[];
let correctas=0;
let tipo="";
let respuestas=[];
let tiempo=1200;

/* ================= UTIL ================= */

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

/* ================= INICIAR ================= */

function iniciar(){

if(!document.getElementById("nombre").value){
alert("Coloca tu nombre");
return;
}

examen=[
...shuffle(banco.seleccion).slice(0,5),
...shuffle(banco.vf).slice(0,5),
...shuffle(banco.afirmaciones).slice(0,5),
...shuffle(banco.ordenar).slice(0,5)
];

document.getElementById("inicio").classList.add("hidden");
document.getElementById("examen").classList.remove("hidden");

timer();
cargar();
}

/* ================= TIMER ================= */

function timer(){
let t=setInterval(()=>{
tiempo--;

let m=Math.floor(tiempo/60);
let s=tiempo%60;

document.getElementById("timer").innerText=`${m}:${s<10?"0"+s:s}`;

if(tiempo<=0){
clearInterval(t);
finalizar();
}
},1000);
}

/* ================= CARGAR ================= */

function cargar(){

if(i<5)tipo="seleccion";
else if(i<10)tipo="vf";
else if(i<15)tipo="afirmaciones";
else tipo="ordenar";

let p=examen[i];

document.getElementById("progreso").innerText=`${i+1}/20`;
document.getElementById("pregunta").innerText=p.p;

let html="";

if(tipo==="vf"){
html+=`<div class="opcion" onclick="select(true,event)">Verdadero</div>`;
html+=`<div class="opcion" onclick="select(false,event)">Falso</div>`;
}else{
p.o.forEach((op,j)=>{
html+=`<div class="opcion" onclick="select(${j},event)">${op}</div>`;
});
}

document.getElementById("opciones").innerHTML=html;
}

/* ================= SELECCION ================= */

function select(val,e){

if(tipo==="seleccion"||tipo==="vf"){
seleccion=[val];
document.querySelectorAll(".opcion").forEach(o=>o.classList.remove("selected"));
e.target.classList.add("selected");
}

if(tipo==="afirmaciones"){
if(seleccion.includes(val)){
seleccion=seleccion.filter(x=>x!==val);
e.target.classList.remove("selected");
}else{
seleccion.push(val);
e.target.classList.add("selected");
}
}

if(tipo==="ordenar"){
seleccion.push(val);
e.target.classList.add("selected");
}
}

/* ================= CONFIRMAR ================= */

function confirmar(){

if(seleccion.length===0){
alert("Selecciona una respuesta");
return;
}

let p=examen[i];
let ok=false;

if(tipo==="seleccion") ok=seleccion[0]===p.c;
if(tipo==="vf") ok=seleccion[0]===p.c;
if(tipo==="afirmaciones") ok=JSON.stringify(seleccion.sort())===JSON.stringify(p.c);
if(tipo==="ordenar") ok=JSON.stringify(seleccion)===JSON.stringify(p.c);

if(ok)correctas++;

respuestas.push({pregunta:p.p,estado:ok?"🟩":"🟥"});

document.getElementById("sig").style.display="inline-block";
}

/* ================= SIGUIENTE ================= */

function siguiente(){
seleccion=[];
i++;

if(i>=20)finalizar();
else{
document.getElementById("sig").style.display="none";
cargar();
}
}

/* ================= FINAL ================= */

function finalizar(){

document.getElementById("examen").classList.add("hidden");
document.getElementById("resultado").classList.remove("hidden");

let nota=3+17*(correctas/20);

let detalle="";
respuestas.forEach((r,idx)=>{
detalle+=`${idx+1}. ${r.estado} ${r.pregunta}\n`;
});

let reporte=`Alumno: ${document.getElementById("nombre").value}
Nota: ${nota.toFixed(1)}/20

${detalle}`;

document.getElementById("resultado").innerHTML=`
<h2>Nota: ${nota.toFixed(1)}/20</h2>
<pre>${detalle}</pre>
<button onclick="location.reload()">Nuevo examen</button>
`;

emailjs.send("service_uzg3ddl","template_r0mmp9w",{
nombre:document.getElementById("nombre").value,
nota:nota.toFixed(1),
reporte:reporte
});
}
</script>

</body>
</html>
